name: Spring Boot Application Deploy
on:
  push:
    branches: [ "dev-v2" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Git repository checkout
        uses: actions/checkout@v4

      - name: JDK 17 м„Өм№ҳ
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: нҢҢмқј м „мҶЎмқ„ мң„н•ң л””л үнҶ лҰ¬ мғқм„ұ
        run: mkdir ./survey-app

      - name: Fix Docker permissions # мқҙлҜё м„Өм№ҳ лҗҳм–ҙ мһҲлҠ” лҸ„м»Ө мӮ¬мҡ©.
        run: |
          sudo chmod 666 /var/run/docker.sock
          docker info

      - name: ENV нҢҢмқј мғқм„ұ
        run: |
          echo "${{ secrets.ENV_PROPERTIES }}" > ./.env
          echo "${{ secrets.ENV_PROPERTIES }}" > ./survey-app/.env

      - name: docker-compose.yml нҢҢмқј мғқм„ұ
        run: mv ./docker-compose.yml ./survey-app

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Gradle build
        run: ./gradlew clean build

      - name: Archive нҢҢмқјлӘ… ліҖкІҪ
        run: mv ./build/libs/*SNAPSHOT.jar ./survey-app/app.jar

      - name: Dockerfile мғқм„ұ
        run: mv ./Dockerfile ./survey-app

      - name: Build Docker image мғқм„ұ
        run: |
          docker build -t app:latest .

      - name: Docker мқҙлҜём§Җ .tar нҢҢмқј мғқм„ұ
        run: docker save -o app.tar app:latest

      - name: нҢҢмқј мғқм„ұ нҷ•мқё
        run: |
          echo "===== нҢҢмқј лӘ©лЎқ нҷ•мқё ====="
          ls -la ./survey-app/

      - name: SCPлЎң EC2м—җ нҢҢмқј м „мҶЎ
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PEM_KEY }}
          source: ./survey-app
          target: /home/ec2-user/deploy

      - name: SSHлҘј нҶөн•ҙ EC2м—җ м ‘мҶҚ нӣ„ Docker ComposeлЎң м„ңл№„мҠӨ мһ¬мӢңмһ‘
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |
            # нҢҢмқј м „мҶЎ нҷ•мқё
            echo "===== нҢҢмқј м „мҶЎ нҷ•мқё ====="
            ls -la /home/ec2-user/deploy/survey-app
            
            # лЎӨл°ұ л””л үнҶ лҰ¬ мғқм„ұ л°Ҹ мқҙм „ лІ„м „ л°ұм—…
            rm -rf /home/ec2-user/rollback
            mkdir /home/ec2-user/rollback
            
            # кё°мЎҙ м„ңл№„мҠӨк°Җ мӢӨн–ү мӨ‘мқҙл©ҙ мӨ‘м§Җн•ҳкі  л°ұм—…
            if [ -d "/home/ec2-user/survey-app" ]; then
              cd /home/ec2-user/survey-app
              docker-compose down || true
            fi
            mv /home/ec2-user/survey-app /home/ec2-user/rollback
            
            # мғҲ лІ„м „ л°°нҸ¬ мӨҖл№„
            rm -rf /home/ec2-user/survey-app
            mkdir /home/ec2-user/survey-app
            mv /home/ec2-user/deploy/survey-app /home/ec2-user
            
            # Docker ComposeлЎң м„ңл№„мҠӨ мӢңмһ‘
            cd /home/ec2-user/survey-app
            docker load -i app.tar
            docker-compose build --no-cache
            docker-compose up -d
            
            # л°°нҸ¬ нӣ„ мһ„мӢң нҢҢмқј м •лҰ¬
            rm -rf /home/ec2-user/deploy
            mkdir /home/ec2-user/deploy