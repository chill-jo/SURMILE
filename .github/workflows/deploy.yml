name: Spring Boot Application Deploy
on:
  push:
    branches: [ "dev-v3", "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Git repository checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 파일 전송을 위한 디렉토리 생성
        run: mkdir ./survey-app

      - name: Fix Docker permissions
        run: |
          sudo chmod 666 /var/run/docker.sock
          docker info

      - name: ENV 파일 생성
        run: |
          echo "${{ secrets.ENV_PROPERTIES }}" > ./.env
          echo "${{ secrets.ENV_PROPERTIES }}" > ./survey-app/.env

      - name: docker-compose.yml 파일 생성
        run: mv ./docker-compose.yml ./survey-app

      - name: build & Test
        run: ./gradlew clean build

      - name: Docker image 생성
        run: docker build -t app:latest .

      - name: Docker 이미지 .tar 파일 생성
        run: docker save -o ./survey-app/app.tar app:latest

      - name: 파일 생성 확인 (로컬)
        run: |
          echo "===== 로컬 survey-app 디렉토리 확인 ====="
          pwd
          ls -R ./survey-app

      - name: Ensure deploy dir exists on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |
            mkdir -p /home/ec2-user/deploy
            chmod 755 /home/ec2-user/deploy

      # 🔍 디버그 스텝 추가
      - name: Check local survey-app content
        run: |
          echo "===== GitHub Actions 워크 디렉토리 ====="
          pwd
          ls -la
          echo "===== survey-app 디렉토리 ====="
          ls -R ./survey-app || echo "⚠️ survey-app 디렉토리가 없습니다"

      - name: Try manual tar for debug
        run: tar -zcf /tmp/test.tar.gz ./survey-app && ls -lh /tmp/test.tar.gz

      - name: Debug PEM key format
        run: |
          echo "${{ secrets.EC2_PEM_KEY }}" > id_rsa
          file id_rsa
          head -5 id_rsa

      ###########################################
      # ✅ Debug Steps (EC2 연결 문제 확인용)
      ###########################################

      - name: Check local survey-app content
        run: |
          echo "===== survey-app 디렉토리 내용 ====="
          ls -R ./survey-app || echo "⚠️ survey-app 없음"

      - name: Try manual tar for debug
        run: tar -zcf /tmp/test.tar.gz ./survey-app && ls -lh /tmp/test.tar.gz

      - name: Debug PEM key format
        run: |
          echo "${{ secrets.EC2_PEM_KEY }}" > id_rsa
          file id_rsa || true
          head -5 id_rsa || true
          ssh-keygen -y -f id_rsa > /dev/null || echo "⚠️ PEM 키 문제 가능성"

      - name: Check SSH connectivity to EC2
        run: nc -vz -w 5 ${{ secrets.EC2_HOST }} 22 || echo "⚠️ 22번 포트 접근 불가"

      - name: Ensure deploy dir exists on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |
            mkdir -p /home/ec2-user/deploy
            echo "deploy dir ready"

      ###########################################
      # ✅ 실제 배포 단계
      ###########################################

      - name: SCP로 EC2에 파일 전송
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PEM_KEY }}
          source: ./survey-app
          target: /home/ec2-user/deploy
          debug: true

      - name: SSH를 통해 EC2에 접속 후 Docker Compose로 서비스 재시작
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |

            echo "===== 파일 전송 확인 ====="
            ls -la /home/ec2-user/deploy/survey-app

            rm -rf /home/ec2-user/rollback
            mkdir /home/ec2-user/rollback

            if [ -d "/home/ec2-user/survey-app" ]; then
              cd /home/ec2-user/survey-app
              docker compose down || true
            fi
            mv /home/ec2-user/survey-app /home/ec2-user/rollback


            rm -rf /home/ec2-user/survey-app
            mkdir /home/ec2-user/survey-app
            mv /home/ec2-user/deploy/survey-app /home/ec2-user

            cd /home/ec2-user/survey-app
            docker compose down --volumes || true
            docker load -i app.tar
            docker-compose build --no-cache
            docker-compose up -d

            rm -rf /home/ec2-user/deploy
            mkdir /home/ec2-user/deploy
