spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: surveyApp

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
    vectorstore:
      redis:
        initialize-schema: true       # 자동 인덱스 초기화
        index-name: spring-ai-index   # 인덱스 이름
        prefix: embedding             # Redis 키 접두사 설정

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    org:
      hibernate:
        type:
          descriptor:
            sql:
              BasicBinder: info
        org:
          hibernate: debug

jwt:
  secret:
    key: ${JWT_SECRET_KEY}
  access-token:
      expiration:
        mills: 1800000