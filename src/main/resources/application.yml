spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: surveyApp
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

logging:
  level:
    org:
      hibernate:
        type:
          descriptor:
            sql:
              BasicBinder: info
        org:
          hibernate: debug

jwt:
  secret:
    key: ${JWT_SECRET_KEY}
  access-token:
      expiration:
        access-token: 1800000 # 30 minutes
        refresh-token: 1209600000 # 14 days