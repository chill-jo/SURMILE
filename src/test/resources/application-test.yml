spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: surveyApp-test

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  datasource:
    url: jdbc:h2:mem:test_db;MODE=MySQL;
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate.ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}

  data:
    redis:
      host: localhost
      port: 6379
      cache-access-token: accessToken
      cache-refresh-token: refreshToken

jwt:
  secret:
    key: ${JWT_SECRET_KEY}
  access-token:
    expiration:
      access-token: 1800000 # 30 minutes
      refresh-token: 1209600000 # 14 days


