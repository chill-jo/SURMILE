services:
  zookeeper:
    image: zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"

  kafka:
    image: bitnami/kafka:3.4.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ENABLE_KRAFT=no
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    volumes:
      - 'kafka-volume:/bitnami/kafka'
    depends_on:
      - zookeeper

#  redis:
#    image: redis/redis-stack:latest
#    ports:
#      - "6379:6379"
#    container_name: redis

  app:
    build: .
    image: app:latest
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs   # 호스트 ./logs ↔ 컨테이너 /app/logs 연결
    user: "1000:1000"
    restart: always
    container_name: survey-app
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    env_file:
      - .env
    depends_on:
#      - redis
      - kafka

  nginx:
    image: nginx:latest
    ports:
      - 80:80
      - 443:443
    volumes:
      - /home/ec2-user/nginx:/etc/nginx/conf.d
      - /home/ec2-user/certbot/conf:/etc/letsencrypt
      - /home/ec2-user/certbot/www:/var/www/certbot
    depends_on:
      - app

volumes:
  kafka-volume:

