  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
    container_name: redis

  app:
    image: app:latest
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs   # 호스트 ./logs ↔ 컨테이너 /app/logs 연결
    user: "1000:1000"
    restart: always
    container_name: survey-app
#    environment:
#      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    env_file:
      - .env
    depends_on:
      - redis
#      - kafka

  nginx:
    image: nginx:latest
    ports:
      - 80:80
      - 443:443
    volumes:
      - /home/ec2-user/nginx:/etc/nginx/conf.d
      - /home/ec2-user/certbot/conf:/etc/letsencrypt
      - /home/ec2-user/certbot/www:/var/www/certbot
    depends_on:
      - app

